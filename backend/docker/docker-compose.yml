version: "3.9"

# 本地开发依赖三件套 —— MySQL / Milvus(+etcd+minio) / Redis。生产建议托管。
# 启动:
#   cd backend && docker compose -f docker/docker-compose.yml up -d
# 停止: docker compose -f docker/docker-compose.yml down
# 看健康: docker compose -f docker/docker-compose.yml ps
#
# 关于 etcd 镜像:之前用 quay.io/coreos/etcd:v3.5.5,国内拉不到 → milvus 起不来 → 只看到 mysql/redis/milvus 三个,
# 现在统一切到 dockerhub 上的 bitnami/etcd,所有镜像都从 dockerhub 拉(配上 daemon 镜像加速器即可全部成功)。
# 所有 service 都加 restart: unless-stopped + healthcheck,depends_on 用 condition: service_healthy 真正等待依赖就绪。

services:
  mysql:
    image: mysql:8.0
    container_name: rag_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rag_agent
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
    ports:
      - "3307:3306"   # 宿主机 3306 已被本地 MySQL 占用,这里换 3307,.env 里 MYSQL_PORT 同步改
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Milvus 依赖 etcd 和 minio
  etcd:
    # 切到 bitnami(dockerhub),原 quay.io/coreos/etcd 在国内常拉不到
    image: bitnami/etcd:3.5
    container_name: rag_etcd
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: rag_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: rag_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
